<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<!-- GitHub Pages 가 Cache-Control: max-age=600 을 보내 사파리가 10분간 옛 파일을 쓴다.
     학습 화면의 「시험지 만들기」는 주소에 &v=시각 을 붙여 새로 받게 하고,
     주소를 직접 열었을 때를 대비해 아래 메타와 화면의 버전 표기를 둔다. -->
<meta http-equiv="Cache-Control" content="no-cache, must-revalidate">
<title>단어 시험지</title>
<style>
  /* ===== 인쇄 용지 ===== */
  @page { size: A4 portrait; margin: 12mm; }

  /* 크기 x 배치 프리셋. JS 가 <html> 에 data-size / data-layout 을 걸면 여기서 값이 정해진다.
     모바일 사파리는 페이지를 통째로 1.2배 안팎 확대해 인쇄하므로 CSS 상 높이를 줄여둬야 한다.
     2단은 블록 폭이 절반이라 뜻 칸이 좁아지므로 글자와 열 폭을 함께 줄인다. */
  /* 값은 .sheet 마다 정해진다 — 홀수로 남은 DAY 는 2단 모드에서도 1단으로 그려지므로,
     :root 가 아니라 시트 단위로 걸어야 그 장만 1단 값을 쓴다. */
  :root{ --fs:9pt; --pad:3pt; --hfs:12pt; --lfs:9pt; --btfs:9pt; --colno:11mm; --colen:44mm; }
  /* pad 를 키운 건 글자를 키우는 대신 '손글씨 쓸 칸'을 넓히기 위해서다.
     실측(iOS 인쇄): 표가 231mm 에서 끝나 바닥글까지 54mm 가 비었다 → 행 높이로 회수. */
  :root[data-size="mobile"]  .sheet[data-lay="one"]
        { --fs:9pt;   --pad:4.5pt; --hfs:12pt;   --lfs:9pt;  --colno:11mm; --colen:44mm; }
  :root[data-size="mobile"]  .sheet[data-lay="two"]
        { --fs:8.5pt; --pad:4pt;   --hfs:11.5pt; --lfs:9pt;  --btfs:9.5pt; --colno:8mm; --colen:26mm; }
  :root[data-size="desktop"] .sheet[data-lay="one"]
        { --fs:10pt;  --pad:5.5pt; --hfs:13pt;   --lfs:10pt; --colno:11mm; --colen:44mm; }
  :root[data-size="desktop"] .sheet[data-lay="two"]   /* 원본 파이썬 도구 wide 사양 */
        { --fs:8.5pt; --pad:5.5pt; --hfs:11.5pt; --lfs:10pt; --btfs:9.5pt; --colno:8mm; --colen:26mm; }

  *{box-sizing:border-box;}
  html{-webkit-text-size-adjust:100%; text-size-adjust:100%;}   /* iOS 글자 자동확대 차단 */
  body{margin:0; color:#000;
    font-family:'Noto Sans CJK KR','Noto Sans KR','Malgun Gothic','Apple SD Gothic Neo',sans-serif;}

  /* ===== 시험지 본체 (화면·인쇄 공통) ===== */
  .sheet{background:#fff;}
  .hdr{display:flex; justify-content:space-between; align-items:flex-end;
    border-bottom:2pt solid #000; padding-bottom:3pt; margin-bottom:6pt;}
  .hdr .t{font-size:var(--hfs); font-weight:normal;}
  .hdr .lab{font-size:var(--lfs); font-weight:normal;}
  /* 2단 배치: DAY 두 개를 좌·우 블록으로 */
  .row{display:flex; gap:6mm;}
  .block{flex:1; min-width:0;}
  .block .bt{font-size:var(--btfs); margin-bottom:3pt;}
  table{border-collapse:collapse; width:100%; table-layout:fixed;}
  th,td{border:0.8pt solid #000; font-size:var(--fs); padding:var(--pad) 6pt; line-height:1.15;}
  th{background:#fff; font-weight:bold;}
  td.no,th.no{text-align:center; width:var(--colno);}
  td.en,th.en{text-align:center; width:var(--colen);}
  td.ko,th.ko{width:auto;}

  /* 화면 미리보기 폭을 '인쇄될 때의 레이아웃 폭'과 같게 맞춘다.
     이게 어긋나면 화면에서는 한 줄인 뜻이 인쇄에서 두 줄이 되어 표가 길어지고,
     자동 맞춤이 그 증가분을 모른 채 계산해 종이를 넘긴다(2단에서 실제로 발생).
       모바일: 사파리 인쇄 가능 폭 176.4mm ÷ 확대율 1.172 = 150.5mm
       데스크톱: A4 210mm - @page 여백 12mm x2 = 186mm  (크롬은 확대하지 않음) */
  :root[data-size="mobile"]  { --printw:150.5mm; }
  :root[data-size="desktop"] { --printw:186mm; }

  /* ===== 화면 전용 ===== */
  @media screen{
    body{background:#EAE7E1;}
    .bar{position:sticky; top:0; z-index:5; background:#F3EFE7; border-bottom:1.5px solid #D8D0C0;
      padding:12px 14px; display:flex; gap:8px; flex-wrap:wrap; align-items:center;
      font-family:'Noto Sans KR',-apple-system,BlinkMacSystemFont,'Apple SD Gothic Neo',sans-serif;}
    .bar .grow{flex:1 1 auto; min-width:120px;}
    .meta{font-size:13px; font-weight:800; color:#1B2A4A;}
    .tip{font-size:11.5px; color:#6B6455; line-height:1.5; margin-top:3px;}
    .btn{border:none; border-radius:10px; padding:11px 15px; font-size:13.5px; font-weight:800;
      font-family:inherit; cursor:pointer; letter-spacing:.02em; white-space:nowrap;}
    .btn.primary{background:#1B2A4A; color:#F7F3EA;}
    .btn.ghost{background:#F7F3EA; color:#6B6455; border:1.5px solid #D8D0C0;}
    .btn:disabled{opacity:.4; cursor:default;}
    .miniseg{display:flex; background:#E7E1D3; border-radius:9px; padding:2.5px; gap:2px; flex:none;}
    .miniseg button{border:none; background:transparent; border-radius:7px; padding:8px 13px;
      font-size:12.5px; font-weight:800; color:#6B6455; font-family:inherit; cursor:pointer; white-space:nowrap;}
    .miniseg button.on{background:#fff; color:#1B2A4A; box-shadow:0 1px 2px rgba(27,42,74,.15);}
    .fit{font-size:11.5px; font-weight:700;}
    .fit.ok{color:#237A5F;} .fit.no{color:#BE4E38;}
    #wrap{overflow-x:auto; padding:16px 0 40px;}
    .sheet{width:calc(var(--printw) + 24mm); min-height:297mm; padding:12mm; margin:0 auto 14px;
      box-shadow:0 3px 14px rgba(0,0,0,.18);}
    .msg{max-width:460px; margin:40px auto; padding:0 18px; text-align:center;
      font-size:13.5px; color:#6B6455; line-height:1.7;
      font-family:'Noto Sans KR',-apple-system,sans-serif;}
  }

  /* ===== 인쇄 전용 ===== */
  @media print{
    .bar,.noprint{display:none !important;}
    #wrap{overflow:visible; padding:0;}
    .sheet{width:auto; min-height:0; padding:0; margin:0; box-shadow:none;}
    .sheet + .sheet{page-break-before:always; break-before:page;}
  }
</style>
</head>
<body>

<div class="bar noprint">
  <div class="grow">
    <div class="meta" id="meta">불러오는 중…</div>
    <div class="tip">
      용지는 <b>A4</b>. 데스크톱이라면 인쇄 대화상자에서 <b>머리글 및 바닥글</b>도 꺼주세요.<br>
      <span class="fit" id="fit"></span>
    </div>
  </div>
  <div class="miniseg" id="layoutSeg">
    <button data-layout="one">1단</button>
    <button data-layout="two">2단</button>
  </div>
  <div class="miniseg" id="sizeSeg">
    <button data-size="mobile">모바일</button>
    <button data-size="desktop">데스크톱</button>
  </div>
  <button class="btn ghost" id="back">← 학습</button>
  <button class="btn ghost" id="prev" hidden>직전 시험지</button>
  <button class="btn ghost" id="redraw">새로 뽑기</button>
  <button class="btn primary" id="print">인쇄 / PDF 저장</button>
</div>

<div id="wrap"><div class="msg" id="msg">시험지를 준비하는 중…</div></div>

<script>
/* ===== 공통 ===== */
const $ = id => document.getElementById(id);
const shuffle = a => { for(let i=a.length-1;i>0;i--){const j=Math.random()*(i+1)|0;[a[i],a[j]]=[a[j],a[i]];} return a; };
const esc = s => String(s??"").replace(/[&<>]/g, c=>({"&":"&amp;","<":"&lt;",">":"&gt;"}[c]));
const dayLabel = id => "DAY "+String(id).padStart(2,"0");
const K_PAPER = "vq.paper";     // [최신, 직전] 최대 2벌
const K_RANGE = "vq.lastRange"; // 학습 화면과 공유
const K_SIZE   = "vq.paperSize";   // "mobile" | "desktop" — 실제 값은 CSS 프리셋에 있다
const K_LAYOUT = "vq.paperLayout"; // "one" (DAY당 1장) | "two" (DAY 2개를 한 장에)
const A4_BODY_MM = 273;            // A4 세로 297 - 상하 여백 12mm
const LS = {
  get(k, fb){ try{ const v=localStorage.getItem(k); return v==null?fb:JSON.parse(v); }catch(e){ return fb; } },
  set(k, v){ try{ localStorage.setItem(k, JSON.stringify(v)); }catch(e){} }
};
async function fetchJson(path){
  const res = await fetch(`${path}?v=${Date.now()}`, {cache:"no-store"});
  if(!res.ok) throw new Error(`${path} (${res.status})`);
  return res.json();
}

/* ===== 배정 =====
   원본 도구(voca_pdf_tool.build_assignment)와 동일한 규칙:
   - 시험지1은 데이터 순서 그대로 두고 방향만 무작위 — 절반은 K(뜻 빈칸), 절반은 E(영어 빈칸)
   - 시험지2는 같은 단어를 방향 반대로 뒤집고 행 순서도 새로 섞음
   저장은 배정 결과(t1·o2)만 — 단어는 매번 data/*.json에서 다시 읽으므로 재현이 깨지지 않는다. */
function buildAssign(n){
  const idx = shuffle([...Array(n).keys()]);
  const k = new Set(idx.slice(0, n>>1));                       // 홀수면 K가 1개 적음
  const t1 = Array.from({length:n}, (_,i)=> k.has(i)?"K":"E").join("");
  return { t1, o2: shuffle([...Array(n).keys()]) };
}
const flip = t => t==="K" ? "E" : "K";
const rows1 = (w, t1)     => w.map((x,i)=>({en:x.en, ko:x.ko, type:t1[i]}));
const rows2 = (w, t1, o2) => o2.map(j=>({en:w[j].en, ko:w[j].ko, type:flip(t1[j])}));

/* ===== 렌더 ===== */
function tableHtml(rows){
  let h = "<tr><th class='no'>No</th><th class='en'>English</th><th class='ko'>뜻 (한글)</th></tr>";
  rows.forEach((r,i)=>{
    const k = r.type==="K";      // K = 뜻 빈칸(영어 제시)
    h += `<tr><td class='no'>${i+1}</td><td class='en'>${k?esc(r.en):""}</td>`
       + `<td class='ko'>${k?"":esc(r.ko)}</td></tr>`;
  });
  return `<table>${h}</table>`;
}
/* 1단 — 페이지 머리에 DAY 제목, 표 하나가 페이지 폭 전체 */
function sheetOne(title, label, rows){
  return `<section class="sheet" data-lay="one"><div class="hdr">`
       + `<span class="t">${esc(title)}</span><span class="lab">${esc(label)}</span>`
       + `</div>${tableHtml(rows)}</section>`;
}
/* 2단 — 페이지 머리는 '단어 시험', DAY 제목은 좌·우 블록마다 (원본 파이썬 도구와 같은 구성) */
function sheetTwo(blocks, label){
  const bs = blocks.map(b=>
    `<div class="block"><div class="bt">${esc(b.title)}</div>${tableHtml(b.rows)}</div>`).join("");
  return `<section class="sheet" data-lay="two"><div class="hdr">`
       + `<span class="t">단어 시험</span><span class="lab">${esc(label)}</span>`
       + `</div><div class="row">${bs}</div></section>`;
}
const L1 = "시험지 1", L2 = "시험지 2 (순서·방향 변경)";
/* 배치에 따라 시트 HTML 목록을 만든다.
   2단에서 DAY 가 홀수로 남으면 그 DAY 만 1단으로 — 반쪽만 채운 장을 만들지 않기 위해서. */
function buildSheets(p){
  const items = p.a.map(({id,t1,o2})=>{
    const d = dayData[id], w = d.words;
    return { title:d.title, r1:rows1(w,t1), r2:rows2(w,t1,o2) };
  });
  if(layout==="one")
    return items.flatMap(x=>[sheetOne(x.title,L1,x.r1), sheetOne(x.title,L2,x.r2)]);
  const out=[];
  for(let i=0;i<items.length;i+=2){
    const pair = items.slice(i,i+2);
    if(pair.length===2){
      out.push(sheetTwo(pair.map(x=>({title:x.title, rows:x.r1})), L1));
      out.push(sheetTwo(pair.map(x=>({title:x.title, rows:x.r2})), L2));
    }else{
      out.push(sheetOne(pair[0].title, L1, pair[0].r1));
      out.push(sheetOne(pair[0].title, L2, pair[0].r2));
    }
  }
  return out;
}

/* ===== 상태 ===== */
const dayData = {};   // id → {title, words}
let ids = [];         // 출제할 DAY (오름차순)
let hist = [];        // [최신, 직전]
let viewing = 0;

/* 기기 자동 판별 — 저장된 선택이 없을 때만 쓰는 초기값.
   iPadOS 는 UA 를 맥으로 위장하므로 터치 지원 개수로 한 번 더 걸러낸다.
   한 번이라도 버튼을 누르면 그 선택이 저장돼 자동 판별보다 우선한다. */
const guessSize = () =>
  ( /iPhone|iPad|iPod|Android/i.test(navigator.userAgent)
    || (navigator.maxTouchPoints > 1 && /Mac/i.test(navigator.platform||""))
    || matchMedia("(pointer: coarse)").matches ) ? "mobile" : "desktop";

/* 크기·배치 적용 + '한 장에 들어가는지' 실측 표시 */
let size   = ["mobile","desktop"].includes(LS.get(K_SIZE,""))   ? LS.get(K_SIZE)   : guessSize();
let layout = ["one","two"].includes(LS.get(K_LAYOUT,""))        ? LS.get(K_LAYOUT) : "one";
function applyOpts(rerender){
  document.documentElement.dataset.size = size;
  $("sizeSeg").querySelectorAll("button").forEach(b=>b.classList.toggle("on", b.dataset.size===size));
  $("layoutSeg").querySelectorAll("button").forEach(b=>b.classList.toggle("on", b.dataset.layout===layout));
  if(rerender && hist.length) render(hist[viewing]); else measure();
}
/* iOS 인쇄 실측 상수 (2026-07-21, 아이폰 사파리 출력물 4종 측정)
   - 확대율은 '지정한 글자 크기 vs 인쇄된 글자 크기'로 잰다. 표 높이로 재면 머리글 포함 여부에
     따라 값이 흔들려 틀리기 쉽다(실제로 1.105 로 잘못 잡아 종이를 넘겼다).
       1단 본문 9pt→10.55pt / 제목 12pt→14.07pt / 2단 본문 8.5pt→9.96pt  ⇒ 모두 1.172
   - 내용은 13.4mm 에서 시작하고 사파리가 283.4mm 에서 쪽을 나눈다 → 쓸 수 있는 높이 270mm
   - 안전여유가 필요한 이유: 행은 쪼개지지 않으므로 1mm만 초과해도 한 행(약 8mm)이 통째로
     다음 장으로 밀린다. 기기별 확대율 편차까지 고려해 15mm 를 둔다. */
/* 화면에 찍어두는 버전 — 기기가 옛 캐시를 쓰고 있는지 눈으로 바로 확인하려는 것.
   인쇄 규칙(아래 상수·프리셋)을 고칠 때마다 함께 올린다. */
const BUILD = "v5 (2026-07-21)";
const IOS_SCALE  = 1.172;
const IOS_USABLE = 270;
const SAFETY_MM  = 15;
const PAD_MIN = 1.5, PAD_MAX = 8;   // 손글씨 칸이 너무 좁아지지도, 헐렁해지지도 않게

const sheetMM = sh => {
  const hdr=sh.querySelector(".hdr");
  const body=sh.querySelector(".row") || sh.querySelector("table");
  return (hdr.offsetHeight + parseFloat(getComputedStyle(hdr).marginBottom) + body.offsetHeight)*25.4/96;
};
/* 자동 맞춤 — 뜻이 길어 두 줄이 되는 행이 몇 개든 항상 한 장에 들어가게 행 여백을 계산한다.
   글자 크기는 건드리지 않는다(줄바꿈 개수가 바뀌어 계산이 흔들리므로).
   행 여백은 높이에 정확히 선형으로 작용하므로 — 높이 = 고정분 + 행수 x 2 x 여백 —
   한 번 재고 바로 필요한 값을 역산할 수 있다. 남으면 넓히고, 모자라면 좁힌다. */
function autoFit(){
  const target = size==="mobile" ? (IOS_USABLE-SAFETY_MM)/IOS_SCALE : A4_BODY_MM-10;
  let clamped=false;
  ["one","two"].forEach(lay=>{
    const sheets=[...document.querySelectorAll(`.sheet[data-lay="${lay}"]`)];
    if(!sheets.length) return;
    sheets.forEach(s=>s.style.removeProperty("--pad"));      // 프리셋 기본값으로 되돌려 측정
    const cur  = parseFloat(getComputedStyle(sheets[0]).getPropertyValue("--pad"));
    const tall = Math.max(...sheets.map(sheetMM));
    const rows = Math.max(...sheets.flatMap(s=>[...s.querySelectorAll("table")].map(t=>t.rows.length)));
    const perPt = rows*2*25.4/72;                            // 여백 1pt 당 늘어나는 mm
    let pad = cur + (target-tall)/perPt;
    if(pad<PAD_MIN || pad>PAD_MAX) clamped = pad<PAD_MIN;    // 최소까지 줄여도 안 들어가면 경고
    pad = Math.max(PAD_MIN, Math.min(PAD_MAX, pad));
    sheets.forEach(s=>s.style.setProperty("--pad", pad.toFixed(2)+"pt"));
  });
  return clamped;
}
/* 자동 맞춤 결과를 사람이 읽을 수 있게 표시 */
function measure(){
  const sheets=[...document.querySelectorAll(".sheet")]; if(!sheets.length) return;
  const clamped = autoFit();
  const mm  = Math.max(...sheets.map(sheetMM));
  const ios = size==="mobile" ? mm*IOS_SCALE : mm;
  const limit = size==="mobile" ? IOS_USABLE : A4_BODY_MM;
  const rowH = Math.min(...sheets.flatMap(s=>[...s.querySelectorAll("tr")].map(r=>r.offsetHeight)))*25.4/96;
  const base = Math.min(...sheets.flatMap(s=>[...s.querySelectorAll("tr")].map(r=>r.offsetHeight)));
  const two  = sheets.flatMap(s=>[...s.querySelectorAll("tr")]).filter(r=>r.offsetHeight>base*1.5).length;
  const over = ios > limit;
  const el=$("fit");
  el.textContent = `${BUILD} · ${sheets.length}장 · 두 줄 행 ${two}개 · `
    + `행 높이 ${rowH.toFixed(1)}mm(자동 맞춤) · 예상 ${ios.toFixed(0)}/${limit}mm — `
    + (over||clamped ? "한 장을 넘길 수 있음" : "모두 한 장에 들어감");
  el.className = "fit " + (over||clamped ? "no" : "ok");
}
function render(p){
  const sheets = buildSheets(p);
  $("wrap").innerHTML = sheets.join("");
  $("meta").textContent =
    `${p.a.map(x=>dayLabel(x.id)).join(" · ")} — 총 ${sheets.length}장`
    + (viewing===1 ? "  (직전 시험지)" : "");
  $("prev").hidden = hist.length < 2;
  $("prev").textContent = viewing===1 ? "최신 시험지" : "직전 시험지";
  measure();
}
function draw(){
  const p = { a: ids.map(id=>({id, ...buildAssign(dayData[id].words.length)})) };
  hist = [p, ...hist].slice(0,2);   // 새 시험지가 최신, 직전 것은 한 벌만 보관
  LS.set(K_PAPER, hist);
  viewing = 0; render(p);
}

/* ===== 시작 ===== */
async function start(){
  try{
    const all = ((await fetchJson("data/index.json")).days || []);
    if(!all.length) throw new Error("등록된 범위 없음");
    const q = new URLSearchParams(location.search).get("days");
    const want = (q ? q.split(",").map(Number) : LS.get(K_RANGE, []))
      .filter(id => all.some(d=>d.id===id));
    ids = [...new Set(want.length ? want : [all[0].id])].sort((a,b)=>a-b);  // 오래된 DAY부터

    await Promise.all(ids.map(async id=>{
      const e = all.find(d=>d.id===id);
      const j = await fetchJson("data/"+e.file);
      dayData[id] = { title: e.title, words: j.words };
    }));

    // 저장된 이력 중 '같은 범위 + 형식이 온전한' 것만 직전 시험지로 이어받는다
    const usable = p => p && Array.isArray(p.a) && p.a.length===ids.length
      && p.a.every((x,i)=> x.id===ids[i] && typeof x.t1==="string" && Array.isArray(x.o2));
    hist = (LS.get(K_PAPER, []) || []).filter(usable).slice(0,1);
    draw();   // 새 시험지를 앞에 넣고 화면에 그린다
  }catch(e){
    $("wrap").innerHTML = `<div class="msg">시험지를 만들지 못했어요.<br>네트워크 확인 후 새로고침 해주세요.<br><br>${esc(e.message)}</div>`;
    $("meta").textContent = "오류";
    ["prev","redraw","print"].forEach(b=>$(b).disabled=true);
  }
}

$("sizeSeg").querySelectorAll("button").forEach(b=>{
  b.onclick=()=>{ size=b.dataset.size; LS.set(K_SIZE,size); applyOpts(false); };
});
$("layoutSeg").querySelectorAll("button").forEach(b=>{
  b.onclick=()=>{ layout=b.dataset.layout; LS.set(K_LAYOUT,layout); applyOpts(true); };
});
applyOpts(false);
$("print").onclick  = ()=>window.print();
$("redraw").onclick = draw;
$("prev").onclick   = ()=>{ viewing = viewing===0 ? 1 : 0; render(hist[viewing]); };
$("back").onclick   = ()=>location.href = "index.html";
start();
</script>
</body>
</html>
